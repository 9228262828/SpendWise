  <line x1="512" y1="512" x2="512.0" y2="192.0" stroke="white" stroke-width="9" stroke-opacity="0.80"/>
  <line x1="512" y1="512" x2="413.1" y2="816.3" stroke="white" stroke-width="9" stroke-opacity="0.80"/>
  <line x1="512" y1="512" x2="253.1" y2="323.9" stroke="white" stroke-width="9" stroke-opacity="0.80"/>

  <!-- donut hole -->
  <circle cx="512" cy="512" r="152" fill="#16A34A"/>
  <circle cx="512" cy="512" r="136" fill="#15803D"/>

  <!-- arrow up (trend) -->
